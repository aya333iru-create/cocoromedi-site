<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" role="img" aria-label="3人の看護師がつながっているイラスト">
  <defs>
    <style>
      .bg{fill:#f7fbff}
      .node{fill:#fff;stroke:#2b7cff;stroke-width:3;stroke-linejoin:round}
      .hair{fill:#333}
      .uniform{fill:#7db7ff}
      .line{stroke:#2b7cff;stroke-width:4;stroke-linecap:round}
      .face{fill:#ffdcb1}
      .badge{font:600 18px/1.1 sans-serif;fill:#08306b}
    </style>
  </defs>
  <rect class="bg" width="100%" height="100%" rx="16"/>
  <!-- Left nurse -->
  <g transform="translate(160,200)">
    <path class="node" d="M-70-70 h140 v140 h-140 z" rx="10"/>
    <circle class="face" cx="0" cy="-20" r="18"/>
    <path class="hair" d="M-14 -30 q14 -22 28 0"/>
    <rect class="uniform" x="-40" y="10" width="80" height="50" rx="8"/>
    <text class="badge" x="0" y="40" text-anchor="middle">病院A</text>
  </g>
  <!-- Center nurse -->
  <g transform="translate(400,140)">
    <path class="node" d="M-70-70 h140 v140 h-140 z"/>
    <circle class="face" cx="0" cy="-20" r="18"/>
    <path class="hair" d="M-18 -28 q18 -16 36 0"/>
    <rect class="uniform" x="-40" y="10" width="80" height="50" rx="8"/>
    <text class="badge" x="0" y="40" text-anchor="middle">病院B</text>
  </g>
  <!-- Right nurse -->
  <g transform="translate(640,200)">
    <path class="node" d="M-70-70 h140 v140 h-140 z"/>
    <circle class="face" cx="0" cy="-20" r="18"/>
    <path class="hair" d="M-12 -32 q12 -18 24 0"/>
    <rect class="uniform" x="-40" y="10" width="80" height="50" rx="8"/>
    <text class="badge" x="0" y="40" text-anchor="middle">病院C</text>
  </g>
  <!-- Connecting lines -->
  <line class="line" x1="230" y1="200" x2="360" y2="150" />
  <line class="line" x1="440" y1="150" x2="570" y2="200" />
  <!-- Center highlight -->
  <circle cx="400" cy="150" r="10" fill="#2b7cff"/>
</svg>
